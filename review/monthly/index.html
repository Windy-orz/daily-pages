<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1C1A18" media="(prefers-color-scheme: dark)">
<title>月报 - 往期回顾 — 风声驿站NPC</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23B8956A%22/></svg>">
<style>
:root {
  --bg: #FFFFFF; --fg: #1A1A1A;
  --card: #FFFFFF; --card-fg: #1A1A1A;
  --muted: #F5F5F5; --muted-fg: #6B6B6B;
  --border: #E5E5E5;
  --nav-accent: #4A3728;
  --accent-ai: #7A9A8B; --accent-ai-hover: #688677;
  --accent-game: #B8956A; --accent-game-hover: #A07D52;
  --card-ai: #FFFFFF;
  --destructive: #8B3A3A;
  --font-display: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Georgia', 'Times New Roman', serif;
  --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1C1A18; --fg: #EAE4DC;
    --card: #252220; --card-fg: #EAE4DC;
    --muted: #2E2B27; --muted-fg: #9A948E;
    --border: #3D3832;
    --nav-accent: #C4A97D;
    --accent-ai: #8FB5A3; --accent-ai-hover: #7A9A8B;
    --accent-game: #D4B896; --accent-game-hover: #B8956A;
    --card-ai: var(--card);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:light dark;scroll-padding-top:72px}body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}a:hover{text-decoration:underline}
a:focus-visible{outline:2px solid var(--accent-game);outline-offset:2px;border-radius:2px}
button:focus-visible,input:focus-visible{outline:2px solid var(--accent-game);outline-offset:2px}

/* Navigation */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-top:max(0px,env(safe-area-inset-top));height:56px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.nav-brand{font-size:1rem;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:6px;z-index:2}
.nav-brand-icon{width:20px;height:20px;border-radius:6px;object-fit:cover;vertical-align:middle;background:var(--accent-game);opacity:0.85}
.nav-toggle{display:none}
.nav-toggle-label{display:none;width:32px;height:32px;cursor:pointer;z-index:2;position:relative}
.nav-toggle-label span,.nav-toggle-label span::before,.nav-toggle-label span::after{display:block;height:2px;background:var(--fg);border-radius:1px;transition:transform 0.2s,opacity 0.2s;position:absolute;width:20px;left:6px}
.nav-toggle-label span{top:15px}
.nav-toggle-label span::before{content:"";top:-6px}
.nav-toggle-label span::after{content:"";top:6px}
.nav-toggle:checked+.nav-toggle-label span{background:transparent}
.nav-toggle:checked+.nav-toggle-label span::before{top:0;transform:rotate(45deg)}
.nav-toggle:checked+.nav-toggle-label span::after{top:0;transform:rotate(-45deg)}
.nav-links{display:flex;gap:12px;font-size:0.8125rem;font-weight:500}
.nav-links a{color:var(--muted-fg);transition:color 0.15s;padding:6px 2px;border-bottom:2px solid transparent;min-height:44px;display:inline-flex;align-items:center}
.nav-links a:hover,.nav-links a.active{color:var(--fg);text-decoration:none;border-bottom-color:var(--nav-accent);font-weight:600}
@media(max-width:640px){
  .nav-toggle-label{display:block}
  .nav-links{position:fixed;top:56px;left:0;right:0;background:var(--bg);flex-direction:column;gap:0;padding:8px 0;border-bottom:1px solid var(--border);transform:translateY(-120%);transition:transform 0.2s;z-index:1}
  .nav-links a{min-height:48px;padding:12px 20px;border-bottom:1px solid var(--muted);width:100%}
  .nav-toggle:checked~.nav-links{transform:translateY(0)}
}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:16px}
@media(min-width:768px){.container{padding:24px}}
.hero-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:768px){.hero-grid{grid-template-columns:1fr;gap:16px;margin-bottom:20px}}

/* Hero - left: top accent stripe */
.hero-main{border-top:3px solid var(--accent-game);padding-top:16px;padding-left:0}
.hero-main.ai{border-top-color:var(--accent-ai)}
.hero-label{font-size:0.75rem;color:var(--muted-fg);margin-bottom:8px;font-weight:500;letter-spacing:0.04em}
.hero-headline{font-family:var(--font-display);font-size:1.75rem;font-weight:700;line-height:1.3;margin-bottom:12px;text-wrap:balance}
@media(max-width:480px){.hero-headline{font-size:1.25rem}.hero-overview{font-size:0.8125rem}}
.hero-headline a{color:var(--fg)}
.hero-overview{font-size:0.9375rem;color:var(--muted-fg);line-height:1.6;max-width:65ch;margin-bottom:16px}
.hero-actions{display:flex;gap:16px;font-size:0.8125rem;font-weight:500}
.hero-actions a{display:inline-flex;align-items:center;gap:4px}
.hero-actions .game-link{color:var(--accent-game)}
.hero-actions .ai-link{color:var(--accent-ai)}


/* Hero - right sidebar */
.hero-sidebar{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px}
.hero-sidebar h3{font-size:0.8125rem;font-weight:600;margin-bottom:14px;color:var(--muted-fg);letter-spacing:0.03em}
.hero-sidebar li{font-size:0.8125rem;line-height:1.5;padding:7px 0;border-bottom:1px solid var(--muted);list-style:none}
.hero-sidebar li:last-child{border-bottom:none}
.hero-sidebar li .source-tag{display:inline-block;font-size:0.6875rem;color:var(--muted-fg);margin-top:2px}

/* Section header */
.section-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:20px}
.section-title{font-size:1.125rem;font-weight:600}
.section-link{font-size:0.8125rem;color:var(--muted-fg);display:inline-flex;align-items:center;gap:3px}
.section-link:hover{color:var(--fg)}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
@media(max-width:768px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.card-grid{grid-template-columns:1fr}}

/* Magazine cards: no shadows, thin top border + Badge */
.card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--accent-game);border-radius:4px;padding:14px 16px;transition:border-color 0.15s;display:block;position:relative}
.card:hover{border-color:var(--accent-game-hover);text-decoration:none}
.card.ai{border-top-color:var(--accent-ai)}
.card.ai:hover{border-color:var(--accent-ai-hover)}
.card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px;margin-bottom:10px;background:var(--muted)}
/* Hero card (span-2, large headline) */
.card-hero{grid-column:span 2;grid-row:span 2;padding:20px 24px}
.card-hero .card-title{font-size:1.5rem;line-height:1.2;-webkit-line-clamp:3}
.card-hero .card-summary{font-size:0.9375rem;-webkit-line-clamp:3}
/* Brief card (text-only, compact) */
.card-brief{padding:8px 12px}
.card-brief::after{display:none}
.card-brief .card-title{font-size:0.8125rem;-webkit-line-clamp:1}
.card-title{font-family:var(--font-display);font-size:0.9375rem;font-weight:600;line-height:1.3;margin:0 0 6px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--fg);letter-spacing:-0.01em}
.card-summary{font-size:0.8125rem;color:var(--muted-fg);line-height:1.45;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card-subtitle{font-size:0.6875rem;color:var(--muted-fg);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:0.6875rem;color:var(--muted-fg);display:flex;align-items:center;gap:6px;font-family:var(--font-sans)}
.card-meta a{color:var(--muted-fg);display:inline-flex;align-items:center;gap:2px}
.card-meta a:hover{color:var(--fg)}
/* Section divider: thin border-t, newspaper-style */
.section-divider{border-top:1px solid var(--border);margin:20px 0;padding-top:16px}

/* Article detail (专题页) — top border + Badge */
.article-detail{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--accent-game);border-radius:4px;padding:16px 20px;transition:border-color 0.15s;position:relative}
.article-detail:hover{border-color:var(--accent-game)}
.article-detail:last-child{margin-bottom:0}
.article-detail h3{font-size:1rem;font-weight:500;margin-bottom:6px;line-height:1.4}
.article-detail h3 a{color:var(--fg)}
.article-detail .detail-summary{font-size:0.875rem;color:var(--muted-fg);line-height:1.55;margin-bottom:8px}
.article-detail .detail-source{font-size:0.75rem;color:var(--muted-fg);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.article-detail .detail-source a{color:var(--muted-fg);display:inline-flex;align-items:center;gap:2px;font-size:0.6875rem}
.article-detail .detail-source a:hover{color:var(--fg)}
/* AI detail cards: subtle green tint */
.article-detail.ai-card{border-top-color:var(--accent-ai)}

/* More grid */
.more-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:768px){.more-grid{grid-template-columns:1fr}}
.more-section h4{font-size:0.875rem;font-weight:600;margin-bottom:10px}
.more-list li{font-size:0.8125rem;padding:5px 0;border-bottom:1px solid var(--muted);list-style:none}
.more-list li:last-child{border-bottom:none}
.more-list .src{color:var(--muted-fg);font-size:0.6875rem}

/* Keyword tags */
.keywords{display:flex;flex-wrap:wrap;gap:6px}
.keyword-tag{display:inline-block;background:var(--muted);color:var(--muted-fg);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:0.75rem;transition:background 0.15s}
.keyword-tag:hover{background:var(--border);color:var(--fg);text-decoration:none}

/* Editor note */
.editor-note{background:var(--muted);border-radius:8px;padding:18px 22px;margin:28px 0;font-size:0.875rem;color:var(--muted-fg);line-height:1.65;border-left:3px solid var(--border)}
/* Brief list: compact rows for score<3 no-image items */
.brief-list{display:flex;flex-direction:column;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.brief-item{display:flex;align-items:baseline;justify-content:space-between;padding:10px 16px;background:var(--card);gap:12px;border-bottom:1px solid var(--muted)}
.brief-item:last-child{border-bottom:none}
.brief-item h4{font-size:0.8125rem;font-weight:500;line-height:1.4;flex:1}
.brief-item h4 a{color:var(--fg)}
/* 全部资讯源：双列紧凑布局 */
.sources-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.sources-grid .brief-item{border-right:1px solid var(--muted)}
.sources-grid .brief-item:nth-child(2n){border-right:none}
@media(max-width:640px){.sources-grid{grid-template-columns:1fr}.sources-grid .brief-item{border-right:none}}
.brief-source{font-size:0.6875rem;color:var(--muted-fg);white-space:nowrap;flex-shrink:0}
/* Detail cards: 2-column grid for secondary/tertiary */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
@media(max-width:768px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.detail-grid{grid-template-columns:1fr}}
/* Responsive: mobile polish */
@media(max-width:480px){
  .brief-item{flex-direction:column;gap:2px;padding:8px 12px}
  .brief-item h4{white-space:normal}
  .brief-source{font-size:0.625rem}
  .section-header{margin-bottom:12px}
  .section-title{font-size:1rem}
  .keywords{gap:4px}
  .keyword-tag{font-size:0.6875rem;padding:2px 8px}
  .footer{padding:16px;font-size:0.6875rem}
  .card-spotlight .spotlight-text .card-title{font-size:1.125rem}
  .card-spotlight .spotlight-text .card-summary{-webkit-line-clamp:2}
}
/* Spotlight card: left-image-right-text, subtle top accent */
.card-spotlight{display:grid;grid-template-columns:7fr 5fr;gap:20px;align-items:center;padding:0;border:1px solid var(--border);border-top:2px solid var(--accent-game);border-radius:4px;overflow:hidden;background:var(--card)}
.card-spotlight.ai{border-top-color:var(--accent-ai)}
.card-spotlight .spotlight-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:0;margin:0;display:block}
.card-spotlight .spotlight-text{padding:20px 20px 20px 0}
.card-spotlight .spotlight-text .card-title{font-size:1.5rem;line-height:1.2;-webkit-line-clamp:3}
.card-spotlight .spotlight-text .card-summary{font-size:0.9375rem;-webkit-line-clamp:4}
@media(max-width:640px){.card-spotlight{grid-template-columns:1fr;gap:0}
.card-spotlight .spotlight-text{padding:16px}}
/* No-image spotlight: text-dominant */
.card-spotlight.no-img{grid-template-columns:1fr;padding:28px 32px;min-height:200px}
.card-spotlight.no-img .spotlight-text .card-title{font-size:1.75rem;-webkit-line-clamp:4}
.card-spotlight.no-img .spotlight-text .card-summary{font-size:1rem;-webkit-line-clamp:6}
/* Side navigation */
.side-nav{position:fixed;right:max(24px,calc((100vw - 1200px)/2 - 180px));top:100px;width:150px;z-index:5}
@media(max-width:1100px){.side-nav{display:none}}
.side-nav a{display:block;padding:6px 10px;font-size:0.75rem;color:var(--muted-fg);border-left:2px solid transparent;transition:color 0.15s,border-color 0.15s;text-decoration:none}
.side-nav a:hover,.side-nav a.active{color:var(--fg);border-left-color:var(--nav-accent)}

/* Footer */
.footer{border-top:1px solid var(--border);padding:24px;font-size:0.75rem;color:var(--muted-fg);text-align:center;line-height:1.8}
.footer a{color:var(--muted-fg)}
.footer a:hover{color:var(--fg)}
.footer-weekly{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:0.8125rem}
.footer-weekly a{font-weight:500}
.footer-weekly .game-link{color:var(--accent-game)}
.footer-weekly .ai-link{color:var(--accent-ai)}

/* Weekly/Monthly report */
.report-header{margin-bottom:24px}
.report-header h1{font-size:1.5rem;font-weight:600;margin-bottom:8px}
.report-header .period{font-size:0.8125rem;color:var(--muted-fg)}
.report-stories{margin-bottom:24px}
/* NPC commentary — editorial column style */
.npc-commentary{margin:28px 0;padding:24px 28px 24px 24px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--npc-accent,var(--accent-game))}
.npc-header{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.npc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--npc-accent,var(--accent-game));flex-shrink:0}
.npc-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0}
.npc-avatar-sm{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-right:8px;vertical-align:middle}
.npc-name{font-size:0.8125rem;font-weight:600;color:var(--fg);letter-spacing:0.02em;font-family:var(--font-sans)}
.npc-review{font-family:var(--font-display);font-size:1rem;line-height:1.75;color:var(--fg)}
@media(max-width:480px){.npc-commentary{padding:16px 18px 16px 14px}.npc-review{font-size:0.875rem}}
/* NPC section review — magazine subhead style */
.section-npc-review{font-family:var(--font-sans);font-size:0.875rem;color:var(--fg);padding:4px 0 4px 14px;margin-bottom:20px;border-left:2px solid var(--npc-accent,var(--border));line-height:1.6;opacity:0.85}
.report-stories li{padding:10px 0;border-bottom:1px solid var(--muted);font-size:0.875rem;list-style:none}
.report-stories li:last-child{border-bottom:none}
.report-stories strong{display:block;margin-bottom:2px}
.report-stories span{font-size:0.75rem;color:var(--muted-fg)}
.trends-list{margin-bottom:24px}
.trends-list li{padding:5px 0;font-size:0.875rem;list-style:none}
.trends-list li::before{content:"- ";color:var(--muted-fg)}
/* Review archive pages */
.review-list{max-width:800px;margin:0 auto}
.review-month{margin-bottom:24px}
.review-month h2{font-size:1rem;color:var(--muted-fg);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.review-month li{font-size:0.875rem;padding:6px 0;list-style:none;line-height:1.6}
.review-month li a{color:var(--fg)}.review-month li a:hover{color:var(--accent-game)}
.review-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;font-size:0.8125rem}
.review-filters a{padding:4px 12px;border-radius:4px;background:var(--muted);color:var(--muted-fg);text-decoration:none}
.review-filters a:hover{background:var(--border);color:var(--fg)}
.review-filters a.active{background:var(--nav-accent);color:#fff}
</style>
</head>

  </div>
</nav>
